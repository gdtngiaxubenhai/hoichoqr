<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}

input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:18px;
  box-sizing:border-box;
  margin-bottom:14px;
}

button{
  padding:12px 16px;
  margin:5px;
  font-size:15px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

#reader{
  width:100%;
}

#result{
  font-size:24px;
  padding:15px;
  font-weight:bold;
}

#popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:30px;
  border-radius:20px;
  width:80%;
  z-index:9999;
  font-size:28px;
  font-weight:bold;
  display:none;
  box-shadow:0 0 30px #000;
}

.popup-success{
  border:3px solid #00ff99;
  color:#00ff99;
}

.popup-error{
  border:3px solid #ff4444;
  color:#ff4444;
}

.show{
  animation:pop .2s ease;
}

@keyframes pop{

  from{
    transform:translate(-50%,-50%) scale(.7);
    opacity:0;
  }

  to{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
  }
}

#scanBtn{

  position:fixed;

  bottom:20px;

  left:50%;

  transform:translateX(-50%);

  width:85%;

  max-width:500px;

  padding:22px;

  font-size:28px;

  font-weight:bold;

  border-radius:20px;

  background:#00aa55;

  color:white;

  z-index:9999;

  box-shadow:0 0 20px rgba(0,0,0,.4);
}

</style>
</head>

<body>

<!-- ================= LOGIN ================= -->

<div id="loginBox">

  <div
    style="
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin-top:25px;
      margin-bottom:25px;
    "
  >

    <img
      src="https://i.ibb.co/YqNWky2/logo.jpg"
      style="
        width:58px;
        height:58px;
        object-fit:contain;
        border-radius:50%;
        flex-shrink:0;
      "
    >

    <div
      style="
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        line-height:1.3;
      "
    >

      <div
        style="
          font-size:22px;
          font-weight:700;
        "
      >
        Giáo xứ Bến Hải
      </div>

      <div
        style="
          font-size:16px;
          font-weight:700;
          opacity:.95;
        "
      >
        Xứ đoàn Mình Máu Thánh Chúa KiTô
      </div>

    </div>

  </div>

  <div
    style="
      width:90%;
      max-width:420px;
      margin:auto;
      background:#1b1b1b;
      padding:25px;
      border-radius:20px;
      box-sizing:border-box;
    "
  >

    <div
      style="
        font-size:28px;
        font-weight:bold;
        margin-bottom:20px;
      "
    >
      🔐 Đăng nhập quầy
    </div>

    <input
      id="username"
      placeholder="Tài khoản"
    >

    <input
      id="password"
      type="password"
      placeholder="Mật khẩu"
    >

    <button
      onclick="login()"
      style="
        width:100%;
        padding:18px;
        margin-top:8px;
        font-size:22px;
        font-weight:bold;
        border:none;
        border-radius:16px;
        background:#00aa55;
        color:white;
      "
    >
      🔓 Đăng nhập
    </button>

    <div
      id="loginMsg"
      style="
        margin-top:15px;
        font-size:18px;
        color:#ff6666;
      "
    ></div>

  </div>

</div>

<!-- ================= APP ================= -->

<div id="app" style="display:none;">

<div
style="
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  margin-top:15px;
"
>

<img
  src="https://i.ibb.co/YqNWky2/logo.jpg"
  style="
    width:58px;
    height:58px;
    object-fit:contain;
    border-radius:50%;
    flex-shrink:0;
  "
>

<div
  style="
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    line-height:1.3;
  "
>

  <div
    style="
      font-size:22px;
      font-weight:700;
    "
  >
    Giáo xứ Bến Hải
  </div>

  <div
    style="
      font-size:16px;
      font-weight:700;
      opacity:.95;
    "
  >
    Xứ đoàn Mình Máu Thánh Chúa KiTô
  </div>

</div>

</div>

<div
style="
  margin-top:10px;
  font-size:18px;
"
id="userInfo"
></div>

<div id="reader" style="display:none;"></div>

<button onclick="openScanner()" id="scanBtn">
📷 Bắt đầu quét
</button>

<div id="result"></div>

<div id="popup"></div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxWSHtfL7FxAAzaAl5pHf427Z_VNDJoZDU5HzjdtZy4ZwioHOh9SN5MHCoV0o-4jJdN/exec";

const result =
document.getElementById("result");

const popup =
document.getElementById("popup");

const successAudio = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

const errorAudio = new Audio(
"https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
);

successAudio.load();
errorAudio.load();

let html5QrCode =
new Html5Qrcode("reader");

let scanning = true;

let lastCode = "";

let lastTime = 0;

let cameraStarted = false;

let currentUser = "";

let currentBooth = "";

let addingTurn = false;
// ================= AUTO LOGIN =================

const savedUser =
localStorage.getItem("user");

const savedBooth =
localStorage.getItem("booth");

if(savedUser){

  currentUser = savedUser;

  currentBooth = savedBooth;

  document.getElementById("loginBox")
  .style.display = "none";

  document.getElementById("app")
  .style.display = "block";

  document.getElementById("userInfo")
  .innerHTML =
  "👤 " + currentUser
  + " | 🎪 " + currentBooth;
}

// ================= LOGIN =================

function login(){

  const username =
    document.getElementById("username").value.trim();

  const password =
    document.getElementById("password").value.trim();

  if(!username || !password){

    document.getElementById("loginMsg")
    .innerHTML =
    "❌ Nhập tài khoản và mật khẩu";

    return;
  }

  fetch(

    API

    + "?action=login"

    + "&username="
    + encodeURIComponent(username)

    + "&password="
    + encodeURIComponent(password)

  )

  .then(r=>r.json())

  .then(res=>{

    if(res.success){
      currentUser = res.username || "";
      currentBooth = res.booth || "";

      localStorage.setItem(
        "user",
        currentUser
      );

      localStorage.setItem(
        "booth",
        currentBooth
      );

      document.getElementById("loginBox")
      .style.display = "none";

      document.getElementById("app")
      .style.display = "block";

      document.getElementById("userInfo")
      .innerHTML =
      "👤 " + currentUser
      + " | 🎪 " + currentBooth;

    }else{

      document.getElementById("loginMsg")
      .innerHTML =
      "❌ Sai tài khoản";
    }
  })

  .catch(()=>{

    document.getElementById("loginMsg")
    .innerHTML =
    "❌ Lỗi kết nối";
  });
}

// ================= POPUP =================

function showPopup(html, ok=true){

  popup.style.display = "block";

  popup.className = ok
    ? "popup-success"
    : "popup-error";

  popup.classList.remove("show");

  void popup.offsetWidth;

  popup.classList.add("show");

  popup.innerHTML = html;
}

function hidePopup(){

  popup.style.display = "none";
}

// ================= SUCCESS =================

function successEffect(){

  if(navigator.vibrate){

    navigator.vibrate([200,80,200]);
  }

  successAudio.pause();

  successAudio.currentTime = 0;

  successAudio.play().catch(()=>{});

  document.body.style.background = "#063";

  setTimeout(()=>{

    document.body.style.background = "#111";

  },150);
}

// ================= ERROR =================

function errorEffect(){

  if(navigator.vibrate){

    navigator.vibrate([100,80,100]);
  }

  errorAudio.pause();

  errorAudio.currentTime = 0;

  errorAudio.play().catch(()=>{});

  document.body.style.background = "#500";

  setTimeout(()=>{

    document.body.style.background = "#111";

  },200);
}

// ================= DUPLICATE =================

function isDuplicate(code){

  const now = Date.now();

  if(code === lastCode && now - lastTime < 3000){

    return true;
  }

  lastCode = code;

  lastTime = now;

  return false;
}

// ================= OPEN SCANNER =================

async function openScanner(){

  if(cameraStarted) return;

  successAudio.play()
  .then(()=>{

    successAudio.pause();

    successAudio.currentTime = 0;

  })
  .catch(()=>{});

  errorAudio.play()
  .then(()=>{

    errorAudio.pause();

    errorAudio.currentTime = 0;

  })
  .catch(()=>{});

  document.getElementById("reader")
  .style.display = "block";

  document.getElementById("scanBtn")
  .style.display = "none";

  result.innerHTML =
  "📷 Đang mở camera...";

  startCamera();
}

// ================= START CAMERA =================

async function startCamera(){

  try{

    if(cameraStarted){

      await html5QrCode.stop();

      cameraStarted = false;
    }

    await html5QrCode.start(

      {
        facingMode:"environment"
      },

      {
        fps:20,

        qrbox:{
          width:280,
          height:180
        },

        aspectRatio:1.777
      },

      onScan
    );

    cameraStarted = true;

    result.innerHTML =
    "📷 Sẵn sàng quét";

  }catch(err){

    console.log(err);

    result.innerHTML =
    "❌ Không mở được camera";
  }
}

// ================= STOP CAMERA =================

async function stopCamera(){

  try{

    if(cameraStarted){

      await html5QrCode.stop();

      cameraStarted = false;
    }

  }catch(e){

    console.log(e);
  }

  document.getElementById("reader")
  .style.display = "none";

  document.getElementById("scanBtn")
  .style.display = "block";
}

// ================= SCAN =================

function onScan(decodedText){

  if(!scanning) return;

  if(isDuplicate(decodedText)) return;

  scanning = false;

  result.innerHTML =
  "⏳ Đang xử lý...";

  sendData(decodedText);
}

// ================= SEND =================

function sendData(text){

  fetch(

    API

    + "?action=play"

    + "&mtn="
    + encodeURIComponent(text)

    + "&user="
    + encodeURIComponent(currentUser)

    + "&booth="
    + encodeURIComponent(currentBooth)

  )

  .then(r => r.json())

  .then(res => {

    handleResult(res);

  })

  .catch(() => {

    result.innerHTML =
    "❌ Lỗi kết nối";

    errorEffect();

    resetScan();
  });
}

// ================= ADD TURN =================

async function addTurn(qr){

  if(addingTurn) return;

  addingTurn = true;

  const btns =
    popup.querySelectorAll("button");

  btns.forEach(b=>b.disabled=true);

  const input =
    document.getElementById("turnInput");

  const turn =
    Number(input.value || 0);

  if(turn <= 0){

    addingTurn = false;

    btns.forEach(b=>b.disabled=false);

    alert("Nhập số lượt hợp lệ");

    return;
  }

  result.innerHTML =
  "⏳ Đang quy đổi...";

  try{

    const res = await fetch(

      API

      + "?action=addTurn"

      + "&mtn="
      + encodeURIComponent(qr)

      + "&turn="
      + turn

      + "&user="
      + encodeURIComponent(currentUser)

      + "&booth="
      + encodeURIComponent(currentBooth)
    );

    const data =
    await res.json();

    if(data.success){

      successEffect();

      showPopup(

        `
        ✅ Đã cộng lượt

        <br><br>

        🎮 Tổng lượt:
        ${data.remain}
        `,

        true
      );

    }else{

      errorEffect();

      showPopup(

        `
        ❌ ${data.message}
        `,

        false
      );
    }

  }catch(err){

    console.log(err);

    errorEffect();

    alert("Lỗi kết nối");
  }

  setTimeout(async ()=>{

    hidePopup();

    result.innerHTML = "";

    scanning = true;

    addingTurn = false;

    await stopCamera();

  },1500);
}

// ================= CLOSE EXCHANGE =================

async function closeExchange(){

  hidePopup();

  result.innerHTML = "";

  scanning = true;

  await stopCamera();
}

// ================= HANDLE RESULT =================

function handleResult(res){

  if(res.success){

    successEffect();

    result.innerHTML =
    `✅ ${res.message}`;

    showPopup(

      `
      ✅ ${res.message}

      <br><br>

      👤 ${res.name}

      <br>

      🎮 Còn:
      ${res.remain}
      `,

      true
    );

  }else{

    errorEffect();

    result.innerHTML =
    `❌ ${res.message}`;

    if(res.needExchange){

      showPopup(

        `
        ❌ HẾT LƯỢT CHƠI

        <br><br>

        👤 ${res.name}

        <br><br>

        <input
          id="turnInput"
          type="number"
          placeholder="Nhập số lượt"
          style="
            width:80%;
            padding:14px;
            font-size:24px;
            border-radius:12px;
            border:none;
            text-align:center;
          "
        >

        <br><br>

        <div
          style="
            display:flex;
            justify-content:center;
            gap:12px;
          "
        >

          <button
            onclick="closeExchange()"
            style="
              padding:14px 24px;
              font-size:20px;
              border:none;
              border-radius:14px;
              background:#666;
              color:white;
            "
          >
            ❌ Bỏ qua
          </button>

          <button
            onclick="addTurn('${lastCode}')"
            style="
              padding:14px 24px;
              font-size:20px;
              border:none;
              border-radius:14px;
              background:#00aa55;
              color:white;
            "
          >
            ✅ Quy đổi
          </button>

        </div>
        `,

        false
      );

      stopCamera();

      return;
    }

    showPopup(

      `
      ❌ ${res.message}
      `,

      false
    );
  }

  resetScan();
}

// ================= RESET =================

function resetScan(){

  setTimeout(async ()=>{

    hidePopup();

    scanning = true;

    result.innerHTML ="";

    await stopCamera();

  },1500);
}

</script>

</body>
</html>
